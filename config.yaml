strategy:
  symbols: ["btcusdt", "ethusdt", "solusdt"]

  # Signal: trade the official Polymarket event, not raw Binance spot
  edge_threshold_pct: 0.003        # 0.3% minimum deviation to generate a signal
  min_secs_remaining: 30           # skip markets with < 30s left
  min_secs_elapsed: 30             # wait 30s after window opens before trading
  require_official_source: true    # require official Polymarket/Chainlink anchor before trading
  official_max_age_sec: 15         # skip if official anchor is too stale
  max_source_divergence_pct: 0.0025
  source_gap_penalty_mult: 8.0

  # Probability model: static fallback vols (overridden by realized vol when available)
  annual_vol_btcusdt: 0.60
  annual_vol_ethusdt: 0.75
  annual_vol_solusdt: 1.00

  # Realized volatility: prefer live estimate from Binance tick stream
  use_realized_vol: true
  realized_vol_lookback_sec: 300   # 5-minute rolling window for vol estimation
  realized_vol_min_ticks: 20       # minimum ticks required to trust realized vol

  # Signal guard: one trade per market window
  signal_cooldown_sec: 120

  # Execution: submit only if fill-adjusted EV = fill_prob × B × (p_adj / q - 1) >= min_ev_usd
  bet_size_usd: 5                  # must satisfy order_min_size × q; auto-scales via max_bet_multiplier
  max_bet_multiplier: 2.5          # allow effective bet up to 2.5× base when min_order_size requires it
  min_liquidity: 1000
  min_ev_usd: 0.10                 # minimum real EV in USD to place a trade
  adverse_selection_haircut: 0.05  # base haircut; increases toward settlement per time_ramp
  adverse_selection_time_ramp_sec: 300  # haircut doubles linearly in last N seconds before settlement
  fill_adverse_coeff: 0.03         # EV discount for fill-win probability correlation
  maker_offset_ticks: 1
  fill_rate_prior: 0.35            # prior maker fill ratio before enough live samples exist
  fill_min_samples: 20             # minimum resolved live orders before using empirical fill stats
  fill_lookback_hours: 168         # empirical fill window
  fill_decay_half_life_hours: 24   # older fills decay exponentially
  fill_prior_strength: 12          # pseudo-sample count for the heuristic prior
  fill_confidence_scale: 8         # higher = slower confidence growth
  fill_lower_bound_z: 1.0          # use mean - z * stderr as conservative fill ratio
  quote_max_spread_abs: 0.12       # reject token books wider than this; likely dust/stale
  quote_max_mid_deviation_abs: 0.10
  quote_extreme_edge_threshold: 0.02
  allow_quote_fallback: true       # if token top-of-book is obviously bad, fall back to synthetic quote around token_price

  # Exit: sell-first, redeem-fallback
  exit_enabled: true
  exit_poll_interval_sec: 5
  exit_min_hold_secs: 15
  exit_resolution_buffer: 0.015
  exit_capital_lock_penalty: 0.01
  exit_min_improvement_abs: 0.005

  # Probability calibration (optional; generated from annotated resolved-truth recordings)
  prob_calibration_path: "data/calibration/prob_calibration.json"
  prob_calibration_min_samples: 50
  prob_calibration_prior_strength: 20.0

  # Market registry
  registry_refresh_sec: 15
  official_refresh_sec: 5

risk:
  dry_run: true
  require_live_arm: true
  clob_heartbeat_interval_sec: 5
  max_live_orders_per_day: 4
  max_live_notional_usd_per_day: 20       # raised for bet_size=5
  max_consecutive_expired: 8              # circuit breaker: pause after N consecutive expired/unfilled orders
  circuit_breaker_cooldown_sec: 900       # 15-min cooldown after circuit breaker triggers
  max_directional_exposure_usd: 15        # max pending+filled exposure per direction (UP/DOWN)

redeem:
  enabled: true
  require_auth: true
  tracked_strategy_only: true
  poll_interval_sec: 180

alerts:
  dingtalk_webhook: ""             # set via DINGTALK_WEBHOOK env var
  dingtalk_keyword: "PolyGod"
  heartbeat_interval_sec: 3600     # 0 to disable; default 1 hour
