strategy:
  symbols: ["btcusdt", "ethusdt", "solusdt"]

  # Signal: trigger when Binance price deviates from 15-min opening price
  edge_threshold_pct: 0.003        # 0.3% deviation from opening price
  min_secs_remaining: 30           # skip markets with < 30s left
  min_secs_elapsed: 30             # wait 30s after window opens before trading

  # Signal guard: one trade per direction per 15-min window
  signal_cooldown_sec: 120

  # Execution
  bet_size_usd: 15                 # USD per trade
  min_liquidity: 1000              # skip markets with less liquidity
  min_ev_usd: 0.10                 # skip trades where gross EV < this
  maker_offset_ticks: 1            # ticks below mid to ensure maker status

  # Market registry: how often to re-fetch market data from Polymarket
  registry_refresh_sec: 15

risk:
  dry_run: true                    # true = paper trading, false = real money

alerts:
  dingtalk_webhook: ""              # set via DINGTALK_WEBHOOK env var
  dingtalk_keyword: "PolyGod"
